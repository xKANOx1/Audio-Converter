name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate imports
        run: |
          python - <<'PY'
          import convertidor_audio.app
          import convertidor_audio.conversion
          import convertidor_audio.formats
          import convertidor_audio.workers
          import convertidor_audio.ui.main_window
          import convertidor_audio.ui.style
          print("Imports OK")
          PY

      - name: Syntax compile check
        run: python -m compileall src
